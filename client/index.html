<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestionnaire des Stagaires / Formateurs</title>
    <link rel="stylesheet" href="src/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css
"
    />
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>

    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script type="module" src="src/index.js"></script>
  </head>

  <body>
    <div class="alert">
      Failed to get data! <span class="mdi mdi-alert-circle-outline"></span>
    </div>
    <main>
      <header>
        <div>
          <button class="selected" id="selectStagaires">Stagaires</button>
          <button id="selectFormateurs">Formateurs</button>
        </div>
      </header>

      <section>
        <h1 class="title">Stagaires</h1>
        <div class="controls">
          <div class="search">
            <input id="searchInput" type="search" placeholder="Trouver..." />
            <span class="material-symbols-outlined"> search </span>
          </div>
          <button class="ajoute-btn">
            AJouter stagaire <span class="mdi mdi-account-plus-outline"></span>
          </button>
        </div>
        <div class="table-container">
          <table>
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
